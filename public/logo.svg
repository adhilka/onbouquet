<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="100%" height="100%">
  <defs>
    <style>
      .sketch {
        fill: none;
        stroke: #292524;
        stroke-width: 3.5;
        stroke-linecap: round;
        stroke-linejoin: round;
      }
      .flower-fill { fill: #fb7185; }
      .leaf-fill { fill: #d9f99d; }
      .env-fill { fill: #fafaf9; }
      .sparkle-fill { fill: #fef08a; }
    </style>
  </defs>
  
  <!-- Dashed Background Circle -->
  <circle cx="60" cy="60" r="54" class="sketch env-fill" stroke-dasharray="10 8" />

  <!-- Envelope Back Flap (Open) -->
  <path d="M25 65 L60 40 L95 65" class="sketch env-fill" />

  <!-- Flower Stem & Leaf -->
  <path d="M60 75 Q45 50 60 35" class="sketch" />
  <path d="M54 58 Q38 55 42 45 Q48 50 54 58" class="sketch leaf-fill" />
  
  <!-- Flower Head -->
  <path d="M48 35 C42 15 60 10 60 35 C70 10 80 15 72 35 C70 55 50 55 48 35 Z" class="sketch flower-fill" />
  <path d="M60 35 C55 20 65 20 60 35" class="sketch" />

  <!-- Envelope Front -->
  <path d="M25 65 L95 65 L95 95 L25 95 Z" class="sketch env-fill" />
  <path d="M25 65 L60 85 L95 65" class="sketch" />
  <path d="M25 95 L45 80" class="sketch" />
  <path d="M95 95 L75 80" class="sketch" />
  
  <!-- Sparkles -->
  <path d="M30 25 Q30 30 25 30 Q30 30 30 35 Q30 30 35 30 Q30 30 30 25 Z" class="sketch sparkle-fill" stroke-width="2.5" />
  <path d="M90 45 Q90 48 87 48 Q90 48 90 51 Q90 48 93 48 Q90 48 90 45 Z" class="sketch sparkle-fill" stroke-width="2.5" />
</svg>
